openapi: 3.1.0
info:
  title: SkyHealth Middleware API
  version: "0.5.1"
  description: GA4 + Social KPI endpoints for SkyHealth Media agent.

servers:
  - url: https://skyhealth-media-ga4.onrender.com

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /clients:
    get:
      operationId: listClients
      summary: List all registered clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        "401":
          description: Missing or invalid bearer token

  /kpi/ga4:
    get:
      operationId: getGa4Kpis
      summary: Get GA4 KPIs (sessions/users + top pages)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: client
          description: Optional client key, for example `skyhealth`, `kernplacepediatrics`, `pediatricgi`, or `vipeds`
          schema:
            type: string
            example: vipeds
        - in: query
          name: property_id
          description: Numeric GA4 Property ID (optional if client is provided or a default is set on server)
          schema:
            type: string
            example: "529057672"
        - in: query
          name: top_limit
          description: Max number of top pages
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: GA4 KPI payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ga4KpiResponse'
        "401":
          description: Missing or invalid bearer token

  /kpi/social:
    get:
      operationId: getSocialKpis
      summary: Get social KPIs (Instagram/Facebook)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: client
          description: Optional client key, for example `skyhealth`, `pediatricgi`, or `vipeds`
          schema:
            type: string
            example: vipeds
        - in: query
          name: platform
          description: Platform to query
          required: true
          schema:
            type: string
            enum: [instagram, facebook]
        - in: query
          name: accountId
          description: >
            Optional override for Instagram User ID or Facebook Page ID.
            If omitted and client is provided, the server should resolve the correct social account automatically.
            If both are omitted, the server may use defaults.
          schema:
            type: string
            example: "17841476107371059"
        - in: query
          name: postLimit
          description: Max number of posts to fetch
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Social KPI payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialKpiResponse'
        "401":
          description: Missing or invalid bearer token

  /prospects:
    get:
      operationId: listProspects
      summary: Get sample prospects (demo data)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: market
          schema:
            type: string
        - in: query
          name: service
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Prospects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prospect'
        "401":
          description: Missing or invalid bearer token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        ga4_property_id:
          type: string
        ig_account_id:
          type:
            - string
            - "null"
        fb_page_id:
          type:
            - string
            - "null"

    Ga4KpiResponse:
      type: object
      properties:
        client:
          type:
            - string
            - "null"
        property_id:
          type: string
        sessions:
          type: object
          properties:
            7d:
              type: integer
            28d:
              type: integer
        users:
          type: object
          properties:
            7d:
              type: integer
            28d:
              type: integer
        top_pages:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              pv:
                type: integer
              sessions:
                type: integer
        traffic_sources:
          type: object
          description: Sessions and users broken down by channel (Organic Search, Paid Search, Social, Direct, Referral, etc.)
          properties:
            7d:
              type: array
              items:
                $ref: '#/components/schemas/TrafficSource'
            28d:
              type: array
              items:
                $ref: '#/components/schemas/TrafficSource'
        events:
          type: object
          description: Event counts broken down by event name (form_submit, click, phone_call, page_view, etc.)
          properties:
            7d:
              type: array
              items:
                $ref: '#/components/schemas/EventCount'
            28d:
              type: array
              items:
                $ref: '#/components/schemas/EventCount'

    TrafficSource:
      type: object
      properties:
        channel:
          type: string
          description: Channel group name (e.g. Organic Search, Direct, Social, Paid Search, Referral)
        sessions:
          type: integer
        users:
          type: integer

    EventCount:
      type: object
      properties:
        event_name:
          type: string
          description: GA4 event name (e.g. form_submit, click, page_view, scroll, first_visit)
        count:
          type: integer

    SocialKpiResponse:
      type: object
      description: Social KPI results for Instagram or Facebook
      properties:
        client:
          type:
            - string
            - "null"
          description: Client key if resolved via ?client= parameter
        account_id:
          type: string
          description: The Instagram User ID or Facebook Page ID used
        instagram:
          type:
            - object
            - "null"
          properties:
            username:
              type: string
            followers:
              type: integer
            media_count:
              type: integer
            posts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  caption:
                    type:
                      - string
                      - "null"
                  media_type:
                    type:
                      - string
                      - "null"
                    description: Post type (IMAGE, VIDEO, CAROUSEL_ALBUM, REEL)
                  media_url:
                    type:
                      - string
                      - "null"
                  permalink:
                    type:
                      - string
                      - "null"
                  like_count:
                    type: integer
                  comments_count:
                    type: integer
                  views:
                    type:
                      - integer
                      - "null"
                    description: Total times the post was displayed on screen (replaces deprecated impressions metric)
                  reach:
                    type:
                      - integer
                      - "null"
                    description: Number of unique accounts that saw the post
                  timestamp:
                    type:
                      - string
                      - "null"
        facebook:
          type:
            - object
            - "null"
          properties:
            page_name:
              type: string
            followers:
              type: integer
            likes:
              type: integer
            page_views_28d:
              type:
                - integer
                - "null"
              description: >
                Total page views over the last 28 days.
                Fallback from page_views_total when newer metrics are unavailable.
            page_reach_28d:
              type:
                - integer
                - "null"
              description: >
                Unique accounts that viewed page content over the last 28 days.
            posts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  message:
                    type:
                      - string
                      - "null"
                  permalink_url:
                    type:
                      - string
                      - "null"
                  like_count:
                    type: integer
                  comments_count:
                    type: integer
                  shares_count:
                    type: integer
                  engaged_actions:
                    type:
                      - integer
                      - "null"
                    description: >
                      Total engagement actions from post_activity_by_action_type
                      insight (sum of likes, comments, shares as counted by
                      Meta insights API).
                  views:
                    type:
                      - integer
                      - "null"
                    description: >
                      Post-level views. Currently null until Meta completes
                      post_media_view rollout (expected by Jun 15, 2026).
                      Use page_views_28d for reporting.
                  reach:
                    type:
                      - integer
                      - "null"
                    description: >
                      Post-level reach. Currently null, same rollout gap as views.
                      Use page_reach_28d for reporting.
                  created_time:
                    type:
                      - string
                      - "null"

    Prospect:
      type: object
      properties:
        name:
          type: string
        website:
          type:
            - string
            - "null"
        instagram:
          type:
            - string
            - "null"
        last_post_days:
          type:
            - integer
            - "null"
        notes:
          type: string
