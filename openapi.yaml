openapi: 3.1.0
info:
  title: SkyHealth Middleware API
  version: "0.5.0"
  description: GA4 + Social KPI endpoints for SkyHealth Media agent.

servers:
  - url: https://skyhealth-media-ga4.onrender.com

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /clients:
    get:
      operationId: listClients
      summary: List all registered clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        "401":
          description: Missing or invalid bearer token

  /kpi/ga4:
    get:
      operationId: getGa4Kpis
      summary: Get GA4 KPIs (sessions/users + top pages)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: client
          description: Optional client key, for example `skyhealth`, `kernplacepediatrics`, `pediatricgi`, or `vipeds`
          schema:
            type: string
            example: vipeds
        - in: query
          name: property_id
          description: Numeric GA4 Property ID (optional if client is provided or a default is set on server)
          schema:
            type: string
            example: "529057672"
        - in: query
          name: top_limit
          description: Max number of top pages
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: GA4 KPI payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ga4KpiResponse'
        "401":
          description: Missing or invalid bearer token

  /kpi/social:
    get:
      operationId: getSocialKpis
      summary: Get social KPIs (Instagram/Facebook)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: client
          description: Optional client key, for example `skyhealth`, `pediatricgi`, or `vipeds`
          schema:
            type: string
            example: vipeds
        - in: query
          name: platform
          description: Platform to query
          required: true
          schema:
            type: string
            enum: [instagram, facebook]
        - in: query
          name: accountId
          description: >
            Optional override for Instagram User ID or Facebook Page ID.
            If omitted and client is provided, the server should resolve the correct social account automatically.
            If both are omitted, the server may use defaults.
          schema:
            type: string
            example: "17841476107371059"
        - in: query
          name: postLimit
          description: Max number of posts to fetch
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Social KPI payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialKpiResponse'
        "401":
          description: Missing or invalid bearer token

  /prospects:
    get:
      operationId: listProspects
      summary: Get sample prospects (demo data)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: market
          schema:
            type: string
        - in: query
          name: service
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Prospects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prospect'
        "401":
          description: Missing or invalid bearer token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        ga4_property_id:
          type: string
        ig_account_id:
          type: string
          nullable: true
        fb_page_id:
          type: string
          nullable: true

    Ga4KpiResponse:
      type: object
      properties:
        sessions:
          type: object
          properties:
            7d:
              type: integer
            28d:
              type: integer
        users:
          type: object
          properties:
            7d:
              type: integer
            28d:
              type: integer
        top_pages:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              pv:
                type: integer
              sessions:
                type: integer
        events:
          type: array
          items:
            type: object
        conversions:
          type: array
          items:
            type: object

    SocialKpiResponse:
      type: object
      description: Social KPI results for Instagram or Facebook
      properties:
        client:
          type: string
          nullable: true
          description: Client key if resolved via ?client= parameter
        account_id:
          type: string
          description: The Instagram User ID or Facebook Page ID used
        instagram:
          type: object
          nullable: true
          properties:
            username:
              type: string
            followers:
              type: integer
            media_count:
              type: integer
            posts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  caption:
                    type: string
                    nullable: true
                  media_url:
                    type: string
                    nullable: true
                  permalink:
                    type: string
                    nullable: true
                  like_count:
                    type: integer
                  comments_count:
                    type: integer
                  timestamp:
                    type: string
                    nullable: true
        facebook:
          type: object
          nullable: true
          properties:
            page_name:
              type: string
            followers:
              type: integer
            likes:
              type: integer
            posts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  message:
                    type: string
                    nullable: true
                  permalink_url:
                    type: string
                    nullable: true
                  created_time:
                    type: string
                    nullable: true

    Prospect:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
          nullable: true
        instagram:
          type: string
          nullable: true
        last_post_days:
          type: integer
          nullable: true
        notes:
          type: string